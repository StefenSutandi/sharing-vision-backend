name: Backend CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  go-validation:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Verify Go version
        run: go version

      - name: Download dependencies
        run: go mod download

      - name: Verify modules
        run: go mod verify

      - name: Tidy modules
        run: go mod tidy

      - name: Check for unmodified go.mod and go.sum
        run: git diff --exit-code -- go.mod go.sum

      - name: Check Formatting
        run: |
          UNFORMATTED="$(gofmt -l .)"
          if [ -n "$UNFORMATTED" ]; then
            echo "The following Go files require formatting:"
            echo "$UNFORMATTED"
            exit 1
          fi

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test -v ./...

      - name: Build
        run: go build ./cmd/api

  docker-validation:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Start Docker Compose
        run: |
          docker compose down -v --remove-orphans
          docker compose build --no-cache
          docker compose up -d

      - name: Wait for API to be healthy
        run: |
          for i in {1..24}; do
            if curl --fail http://localhost:8080/health; then
              exit 0
            fi
            sleep 5
          done
          docker compose ps
          docker compose logs --no-color
          exit 1

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Newman
        run: npm install -g newman

      - name: Run Newman Tests
        run: |
          newman run postman/Sharing-Vision-Article-API.postman_collection.json \
            -e postman/Sharing-Vision-Local.postman_environment.json

      - name: Cleanup
        if: always()
        run: |
          docker compose logs --no-color
          docker compose down -v --remove-orphans
