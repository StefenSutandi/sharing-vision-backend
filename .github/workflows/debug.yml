name: Debug CI

on:
  push:
    branches:
      - 'debug-ci*'

jobs:
  debug-ci:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: read
    steps:
      - uses: actions/checkout@v4
      - name: Fetch CI runs
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh run view 29409588227 --log > ci.log
          git config user.name "Debug Bot"
          git config user.email "bot@example.com"
          git checkout -b ${GITHUB_REF#refs/heads/}-result
          git add ci.log
          git commit -m "Add log"
          git push -f origin ${GITHUB_REF#refs/heads/}-result
