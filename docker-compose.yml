version: '3.8'
services:
  mysql:
    image: mysql:8.0
    container_name: article_db
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: article
    ports:
      - "3306:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot"]
      interval: 5s
      timeout: 5s
      retries: 20

  migrate:
    image: migrate/migrate:v4.16.2
    container_name: article_migrate
    depends_on:
      mysql:
        condition: service_healthy
    volumes:
      - ./migrations:/migrations:ro
    command:
      - -path
      - /migrations
      - -database
      - mysql://root:root@tcp(mysql:3306)/article
      - up

  api:
    build: .
    container_name: article_api
    ports:
      - "8080:8080"
    depends_on:
      migrate:
        condition: service_completed_successfully
    environment:
      - PORT=8080
      - DB_HOST=mysql
      - DB_PORT=3306
      - DB_USER=root
      - DB_PASSWORD=root
      - DB_NAME=article
