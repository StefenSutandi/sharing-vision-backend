version: '3.8'
services:
  mysql:
    image: mysql:8.0
    container_name: article_db
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: article
    ports:
      - "3306:3306"
    healthcheck:
      test: ["CMD-SHELL", "mysql -uroot -proot -e 'USE article;'"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 15s

  migrate:
    image: migrate/migrate:v4.16.2
    container_name: article_migrate
    depends_on:
      mysql:
        condition: service_healthy
    volumes:
      - ./migrations:/migrations:ro
    command:
      - -path
      - /migrations
      - -database
      - mysql://root:root@tcp(mysql:3306)/article
      - up

  api:
    build: .
    container_name: article_api
    ports:
      - "8080:8080"
    depends_on:
      migrate:
        condition: service_completed_successfully
    environment:
      - PORT=8080
      - DB_DSN=root:root@tcp(mysql:3306)/article?charset=utf8mb4&parseTime=True&loc=Local
